services:
  postgres:
    image: postgres:16-alpine
    container_name: autofoda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autofoda
      POSTGRES_USER: autofoda
      POSTGRES_PASSWORD: autofoda
    ports:
      - "5432:5432"
    volumes:
      - autofoda-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autofoda -d autofoda"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  autofoda-postgres-data:
